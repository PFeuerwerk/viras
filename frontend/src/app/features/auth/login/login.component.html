<div class="tw:min-h-screen tw:flex tw:items-center tw:justify-center tw:p-6 tw:bg-gradient-to-br tw:from-slate-50 tw:to-slate-200">
    <div class="tw:w-full tw:max-w-[440px] tw:bg-white tw:p-10 tw:rounded-[24px] tw:shadow-2xl tw:border tw:border-slate-100 tw:sm:p-6">
        <!-- Cabecera alineada al estilo SaaS -->
        <div class="tw:text-center tw:mb-8">
            <img src="/assets/logo.png" alt="VIRAS Logo" class="tw:h-[70px] tw:mx-auto tw:mb-4 tw:object-contain">
            <h2 class="tw:text-3xl tw:font-extrabold tw:text-slate-900 tw:tracking-tight tw:mb-2">Bienvenido de nuevo</h2>
            <p class="tw:text-slate-500 tw:text-sm">Accede a tu panel de gestión o citas</p>
        </div>

        <!-- Mensajes de Error Profesionales -->
        <div *ngIf="errorMessage" class="tw:p-4 tw:bg-red-50 tw:text-red-600 tw:text-sm tw:font-semibold tw:rounded-xl tw:border tw:border-red-100 tw:mb-6 tw:text-center">
            {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="tw:space-y-5">

            <!-- Email -->
            <div class="tw:flex tw:flex-col">
                <label for="email" class="viras-label">Correo Electrónico</label>
                <input id="email" type="email" formControlName="email" class="viras-form-control"
                    [class.is-invalid]="f['email'].touched && f['email'].invalid" placeholder="nombre@ejemplo.com">

                <div *ngIf="f['email'].touched && f['email'].invalid" class="viras-error-msg">
                    <span *ngIf="f['email'].errors?.['required']">El correo es requerido.</span>
                    <span *ngIf="f['email'].errors?.['email']">Ingrese un correo válido.</span>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="tw:flex tw:flex-col">
                <label for="password" class="viras-label">Contraseña</label>

                <div class="tw:relative">
                    <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        class="viras-form-control tw:pr-12" [class.is-invalid]="f['password'].touched && f['password'].invalid"
                        placeholder="••••••••">

                    <span class="tw:absolute tw:right-4 tw:top-1/2 tw:-translate-y-1/2 tw:cursor-pointer tw:text-slate-400 tw:transition-colors tw:hover:text-blue-600 tw:z-10" (click)="togglePassword()">
                        <i class="material-icons tw:text-xl">{{ showPassword ? 'visibility' : 'visibility_off' }}</i>
                    </span>
                </div>

                <div *ngIf="f['password'].touched && f['password'].invalid" class="viras-error-msg">
                    <span *ngIf="f['password'].errors?.['required']">La contraseña es requerida.</span>
                </div>
            </div>

            <!-- Botón de Acción Principal -->
            <div class="tw:pt-4">
                <button type="submit" class="viras-btn-primary tw:w-full tw:py-3.5 tw:text-base tw:disabled:bg-slate-400 tw:disabled:cursor-not-allowed" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Ingresar a mi cuenta</span>
                    <span *ngIf="isLoading" class="tw:inline-block tw:w-5 tw:h-5 tw:border-2 tw:border-white/30 tw:border-t-white tw:rounded-full tw:animate-spin"></span>
                </button>
            </div>
        </form>

        <div class="tw:mt-8 tw:pt-6 tw:border-t tw:border-slate-100 tw:text-center">
            <p class="tw:text-slate-500 tw:text-sm">¿Eres un paciente nuevo?</p>
            <a routerLink="/clinica-dental-pro/registro" class="tw:block tw:mt-2 tw:text-blue-600 tw:font-bold tw:text-sm tw:hover:underline">Regístrate aquí</a>
        </div>
    </div>
</div>
