<section class="tw:py-6 tw:bg-white animate-fade-in" *ngIf="configVisual?.show_services">
    <div class="tw:max-w-[1200px] tw:mx-auto tw:px-[5%]">
        <div class="tw:relative tw:bg-blue-600 tw:rounded-[40px] tw:p-8 tw:flex tw:flex-col tw:md:flex-row tw:items-center tw:justify-between tw:overflow-hidden tw:shadow-2xl tw:shadow-blue-600/20">
            <div class="tw:relative tw:z-10 tw:text-center tw:md:text-left tw:mb-8 tw:md:mb-0">
                <span class="tw:text-white/70 tw:text-xs tw:font-black tw:uppercase tw:tracking-[3px] tw:mb-2 tw:block">Visita nuestra Clínica</span>
                <h2 class="tw:text-3xl tw:md:text-4xl tw:text-white tw:font-black tw:tracking-tight">Agenda una cita con nosotros</h2>
            </div>
            <div class="tw:relative tw:z-10">
                <button class="tw:flex tw:items-center tw:gap-3 tw:px-8 tw:py-4 tw:bg-white tw:text-blue-600 tw:border-none tw:rounded-2xl tw:font-black tw:text-lg tw:cursor-pointer tw:transition-all tw:duration-300 tw:hover:scale-105 tw:hover:shadow-xl" (click)="handleReserve()">
                    <span>Solicita una Cita</span>
                    <i class="material-icons tw:text-2xl">calendar_month</i>
                </button>
            </div>
            <!-- Elemento decorativo sutil de fondo -->
            <div class="tw:absolute tw:-right-20 tw:-bottom-20 tw:w-80 tw:h-80 tw:bg-white/10 tw:rounded-full"></div>
            <div class="tw:absolute tw:-left-20 tw:-top-20 tw:w-60 tw:h-60 tw:bg-white/5 tw:rounded-full"></div>
        </div>
    </div>
</section>
